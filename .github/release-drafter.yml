name-template: 'MacPGP $RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE (#$NUMBER)'
no-changes-template: '- No merged pull requests are included in this draft yet.'
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch
categories:
  - title: 'Features'
    labels:
      - feature
      - enhancement
  - title: 'Fixes'
    labels:
      - fix
      - bug
      - bugfix
  - title: 'Documentation'
    labels:
      - documentation
      - docs
  - title: 'Maintenance'
    labels:
      - chore
      - ci
      - dependencies
      - refactor
template: |
  ## What changed
  $CHANGES

  ## Release checklist
  - [ ] `CHANGELOG.md` updated
  - [ ] macOS build workflow is green
  - [ ] Manual smoke test completed (encrypt/decrypt/sign/verify + extensions)
  - [ ] Distribution artifact and signing/notarization status confirmed

  ## Installation notes
  Until the first packaged release exists, users should build MacPGP from source as described in `README.md`.
